spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    generate_ddl: true

output:
  ansi:
    enabled: always

logging:
  pattern:
    dateformat: "yyyy-MM-dd HH:mm:ss"

app:
  welcome-message: "Welcome to Spring blog!"

rsa:
  private-key: classpath:private.pem
  public-key: classpath:public.pem
